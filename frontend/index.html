<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>分子可视化工具 - Molecular Visualizer</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            height: 100vh;
            overflow: hidden;
        }

        .container {
            display: flex;
            height: 100vh;
        }

        /* 左侧控制面板 */
        .control-panel {
            width: 320px;
            background: rgba(255, 255, 255, 0.95);
            box-shadow: 2px 0 10px rgba(0, 0, 0, 0.1);
            padding: 20px;
            overflow-y: auto;
            z-index: 10;
        }

        .logo {
            text-align: center;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 2px solid #667eea;
        }

        .logo h1 {
            font-size: 22px;
            color: #667eea;
            margin-bottom: 5px;
        }

        .logo p {
            font-size: 12px;
            color: #666;
        }

        .section {
            margin-bottom: 25px;
        }

        .section-title {
            font-size: 16px;
            font-weight: bold;
            color: #333;
            margin-bottom: 12px;
            padding-left: 8px;
            border-left: 4px solid #667eea;
        }

        .btn {
            width: 100%;
            padding: 12px;
            margin: 8px 0;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 10px rgba(102, 126, 234, 0.4);
        }

        .btn-secondary {
            background: #f0f0f0;
            color: #333;
        }

        .btn-secondary:hover {
            background: #e0e0e0;
        }

        .file-input-wrapper {
            position: relative;
            overflow: hidden;
            display: inline-block;
            width: 100%;
        }

        .file-input-wrapper input[type=file] {
            position: absolute;
            left: -9999px;
        }

        .checkbox-group {
            margin: 10px 0;
        }

        .checkbox-item {
            display: flex;
            align-items: center;
            padding: 10px;
            margin: 5px 0;
            background: #f8f9fa;
            border-radius: 6px;
            transition: background 0.2s;
        }

        .checkbox-item:hover {
            background: #e9ecef;
        }

        .checkbox-item input[type="checkbox"] {
            width: 18px;
            height: 18px;
            margin-right: 10px;
            cursor: pointer;
        }

        .checkbox-item label {
            cursor: pointer;
            flex-grow: 1;
            font-size: 14px;
            color: #333;
        }

        /* 信息显示区域 */
        .info-box {
            background: #f8f9fa;
            border-left: 4px solid #667eea;
            padding: 12px;
            border-radius: 6px;
            font-size: 13px;
            line-height: 1.6;
            color: #555;
        }

        .info-box.error {
            border-left-color: #e74c3c;
            background: #fee;
            color: #c0392b;
        }

        .info-box.success {
            border-left-color: #27ae60;
            background: #efe;
            color: #229954;
        }

        /* 右侧3D视图 */
        .canvas-container {
            flex-grow: 1;
            position: relative;
            background: #1a1a2e;
        }

        #canvas3d {
            width: 100%;
            height: 100%;
            display: block;
        }

        /* 加载动画 */
        .loading {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: white;
            font-size: 18px;
            display: none;
        }

        .loading.active {
            display: block;
        }

        /* 提示信息 */
        .hint {
            position: absolute;
            bottom: 20px;
            right: 20px;
            background: rgba(0, 0, 0, 0.7);
            color: white;
            padding: 15px 20px;
            border-radius: 8px;
            font-size: 13px;
            max-width: 300px;
        }

        .hint h3 {
            margin-bottom: 8px;
            font-size: 14px;
        }

        .hint ul {
            list-style: none;
            padding-left: 0;
        }

        .hint li {
            margin: 5px 0;
            padding-left: 20px;
            position: relative;
        }

        .hint li:before {
            content: "•";
            position: absolute;
            left: 5px;
        }

        /* 构建模式特定样式 */
        .builder-mode {
            display: none;
        }

        .builder-mode.active {
            display: block;
        }

        .atom-palette {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 8px;
            margin: 10px 0;
        }

        .atom-btn {
            padding: 12px;
            border: 2px solid #ddd;
            border-radius: 6px;
            background: white;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.2s;
        }

        .atom-btn:hover {
            transform: scale(1.05);
            border-color: #667eea;
        }

        .atom-btn.selected {
            background: #667eea;
            color: white;
            border-color: #667eea;
        }

        /* 元素颜色 */
        .atom-btn[data-element="C"] { color: #909090; }
        .atom-btn[data-element="H"] { color: #ffffff; background: #e8e8e8; }
        .atom-btn[data-element="O"] { color: #ff0d0d; }
        .atom-btn[data-element="N"] { color: #3050f8; }

        /* 隐藏滚动条（可选） */
        .control-panel::-webkit-scrollbar {
            width: 6px;
        }

        .control-panel::-webkit-scrollbar-thumb {
            background: #667eea;
            border-radius: 3px;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- 左侧控制面板 -->
        <div class="control-panel">
            <div class="logo">
                <h1 id="title">🧬 分子可视化工具</h1>
                <p id="subtitle">Molecular Visualization Tool</p>
            </div>

            <!-- 语言切换 -->
            <div class="section">
                <button class="btn btn-secondary" id="langSwitch">
                    <span id="langSwitchText">Switch to English</span>
                </button>
            </div>

            <!-- 文件加载 -->
            <div class="section">
                <div class="section-title" id="loadSectionTitle">📂 加载分子</div>
                <div class="file-input-wrapper">
                    <button class="btn btn-primary" id="fileLoadBtn">
                        <span id="fileLoadBtnText">选择分子文件</span>
                    </button>
                    <input type="file" id="fileInput" accept=".log,.mol,.cif">
                </div>
                <div style="margin-top: 10px; font-size: 12px; color: #666; text-align: center;">
                    <span id="supportedFormatsText">支持格式: .log, .mol, .cif</span>
                </div>
            </div>

            <!-- 显示控制 -->
            <div class="section">
                <div class="section-title" id="displaySectionTitle">👁️ 显示控制</div>
                <div class="checkbox-group">
                    <div class="checkbox-item">
                        <input type="checkbox" id="showLowDensity" checked>
                        <label for="showLowDensity" id="showLowDensityLabel">显示低密度电子云</label>
                    </div>
                    <div class="checkbox-item">
                        <input type="checkbox" id="showHighDensity" checked>
                        <label for="showHighDensity" id="showHighDensityLabel">显示高密度电子云</label>
                    </div>
                    <div class="checkbox-item">
                        <input type="checkbox" id="showAtoms" checked>
                        <label for="showAtoms" id="showAtomsLabel">显示原子</label>
                    </div>
                    <div class="checkbox-item">
                        <input type="checkbox" id="showBonds" checked>
                        <label for="showBonds" id="showBondsLabel">显示化学键</label>
                    </div>
                </div>
            </div>

            <!-- 构建模式 -->
            <div class="section">
                <div class="section-title" id="builderSectionTitle">🔨 分子构建器</div>
                <button class="btn btn-secondary" id="toggleBuilderMode">
                    <span id="builderModeText">启用构建模式</span>
                </button>
                
                <div class="builder-mode" id="builderControls">
                    <div style="font-size: 13px; color: #666; margin: 10px 0;" id="selectAtomText">
                        选择要添加的原子:
                    </div>
                    <div class="atom-palette">
                        <button class="atom-btn" data-element="C">C</button>
                        <button class="atom-btn" data-element="H">H</button>
                        <button class="atom-btn" data-element="O">O</button>
                        <button class="atom-btn" data-element="N">N</button>
                    </div>
                    <button class="btn btn-secondary" id="createBondBtn">
                        <span id="createBondText">创建化学键</span>
                    </button>
                    <button class="btn btn-secondary" id="deleteAtomBtn">
                        <span id="deleteAtomText">删除选中原子</span>
                    </button>
                    <button class="btn btn-secondary" id="clearAllBtn">
                        <span id="clearAllText">清空全部</span>
                    </button>
                </div>
            </div>

            <!-- 功能按钮 -->
            <div class="section">
                <div class="section-title" id="actionsSectionTitle">⚡ 操作</div>
                <button class="btn btn-secondary" id="screenshotBtn">
                    <span id="screenshotText">📷 保存截图 (按S键)</span>
                </button>
                <button class="btn btn-secondary" id="resetViewBtn">
                    <span id="resetViewText">🔄 重置视角</span>
                </button>
            </div>

            <!-- 信息显示 -->
            <div class="section">
                <div class="section-title" id="infoSectionTitle">ℹ️ 信息</div>
                <div class="info-box" id="infoBox"></div>
            </div>
        </div>

        <!-- 右侧3D画布 -->
        <div class="canvas-container">
            <canvas id="canvas3d"></canvas>
            <div class="loading" id="loading">
                <div id="loadingText">正在加载...</div>
            </div>
            <div class="hint">
                <h3 id="hintTitle">💡 操作提示</h3>
                <ul>
                    <li id="hint1">左键拖拽：旋转视图</li>
                    <li id="hint2">滚轮：缩放</li>
                    <li id="hint3">右键拖拽：平移</li>
                    <li id="hint4">按S键：保存截图</li>
                </ul>
            </div>
        </div>
    </div>

    <!-- 引入Three.js库 -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    
    <!-- 引入自定义脚本 -->
    <script src="visualizer.js"></script>
    <script src="ui.js"></script>
    <script src="builder.js"></script>
</body>
</html>
